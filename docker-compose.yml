services:
  jupyterhub:
    build: .
    container_name: jupyterhub
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8009:8009"
      - "8002:8002"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:rw"
      - "jhub_data:/srv/jupyterhub"
      - ./jupyterhub_config.py:/srv/jupyterhub/jupyterhub_config.py:ro
      # Shared data dir: DMS writes here; pre_spawn_hook creates per-user subdirs
      # so that DockerSpawner can bind-mount them into singleuser containers.
      - /home/energyguard/jupyterhub_data:/jupyterhub_data
    networks:
      - nginxproxy_energyguard_net

volumes:
  jhub_data:

networks:
  nginxproxy_energyguard_net:
    external: true
    name: nginxproxy_energyguard_net

